<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成结果 - Career-Sync</title>
    <link rel="stylesheet" href="/static/tailwind.css">
    <style>
        /* Modal styles - inline fallback, no CDN dependency */
        .my-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .my-overlay.open {
            display: flex;
        }
        .my-dialog {
            background: #fff;
            border-radius: 12px;
            max-width: 640px;
            width: calc(100% - 32px);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .my-dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 12px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .my-dialog-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .my-close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
            transition: color 0.15s;
        }
        .my-close-btn:hover { color: #333; }
        .my-dialog-body {
            padding: 18px 24px 24px;
            overflow-y: auto;
            flex: 1;
        }
        .my-dialog-body pre {
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            font-size: 14px;
            color: #374151;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }
        .my-source-tag {
            display: inline-block;
            padding: 4px 10px;
            background: #eef3ff;
            color: #1a56db;
            font-size: 12px;
            border-radius: 6px;
            margin-bottom: 14px;
        }
        .my-copy-btn {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
        }
        .my-copy-btn:hover { background: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <h1 class="text-2xl font-bold text-center mb-10">你的求职材料已生成</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- PDF Resume Card -->
            <div class="bg-white rounded-xl shadow-sm p-6 text-center">
                <div class="text-4xl mb-3">&#128196;</div>
                <h3 class="font-semibold mb-2">定制化简历 PDF</h3>
                <p class="text-sm text-gray-500 mb-4">已根据JD关键词优化</p>
                <a id="pdf-download" href="#" class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">下载 PDF</a>
            </div>

            <!-- Self Intro Card -->
            <div class="bg-white rounded-xl shadow-sm p-6 text-center">
                <div class="text-4xl mb-3">&#128483;</div>
                <h3 class="font-semibold mb-2">面试自我介绍</h3>
                <p class="text-sm text-gray-500 mb-4">基于STAR法则，3分钟版本</p>
                <button onclick="showModal('intro')" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">查看 & 复制</button>
            </div>

            <!-- Company Report Card -->
            <div class="bg-white rounded-xl shadow-sm p-6 text-center">
                <div class="text-4xl mb-3">&#128270;</div>
                <h3 class="font-semibold mb-2">公司深度情报</h3>
                <p class="text-sm text-gray-500 mb-4">面试谈资 + 技术动态</p>
                <button onclick="showModal('company')" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">查看 & 复制</button>
            </div>
        </div>

        <div class="text-center mt-10">
            <a href="/" class="inline-block bg-gray-100 text-gray-600 px-6 py-3 rounded-lg hover:bg-gray-200 font-medium">返回首页 · 制作新简历</a>
        </div>
    </div>

    <!-- Modal (inline styles, no Tailwind dependency) -->
    <div id="modal" class="my-overlay">
        <div class="my-dialog">
            <div class="my-dialog-header">
                <h3 id="modal-title"></h3>
                <button class="my-close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="my-dialog-body">
                <div id="modal-source" class="my-source-tag" style="display:none"></div>
                <pre id="modal-content"></pre>
            </div>
            <button class="my-copy-btn" onclick="copyContent()">复制内容</button>
        </div>
    </div>

    <script>
    const taskId = window.location.pathname.split('/').pop();

    fetch(`/api/result/${taskId}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('pdf-download').href = data.pdf_url || '#';
            window._intro = data.self_intro || '';
            window._company = data.company_info || '';
            window._companySource = data.company_info_source || '';
        });

    function showModal(type) {
        var overlay = document.getElementById('modal');
        var title = document.getElementById('modal-title');
        var content = document.getElementById('modal-content');
        var source = document.getElementById('modal-source');

        if (type === 'intro') {
            title.textContent = '面试自我介绍';
            content.textContent = window._intro;
            source.style.display = 'none';
        } else {
            title.textContent = '公司深度情报';
            content.textContent = window._company;
            if (window._companySource) {
                source.textContent = '\u{1F4CD} ' + window._companySource;
                source.style.display = 'inline-block';
            } else {
                source.style.display = 'none';
            }
        }
        overlay.classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    // Close on overlay click
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    function copyContent() {
        navigator.clipboard.writeText(document.getElementById('modal-content').textContent);
        alert('已复制到剪贴板');
    }
    </script>
</body>
</html>
